name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PRETTIER_VERSION: "3.8.1"
  GOLANGCI_LINT_VERSION: "2.8.0"
  COMMITLINT_CLI_VERSION: "19.3.0"

jobs:
  install-commitlint:
    runs-on: ubuntu-latest
    steps:
      - &checkout-code
        name: Checkout code (shallow)
        uses: actions/checkout@v6

      - &cache-commitlint
        name: Cache Commitlint
        id: cache-commitlint
        uses: actions/cache@v5
        with:
          path: node_modules
          key: v4-commitlint-${{ env.COMMITLINT_CLI_VERSION }}

      - name: Install Commitlint
        if: steps.cache-commitlint.outputs.cache-hit != 'true'
        run: npm i -D @commitlint/cli@${{ env.COMMITLINT_CLI_VERSION }} @commitlint/config-conventional

  run-commitlint:
    runs-on: ubuntu-latest
    needs: install-commitlint
    steps:
      - name: Checkout code (full)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - *cache-commitlint

      - name: Run commitlint
        run: |
          git checkout main
          git checkout -
          ./node_modules/.bin/commitlint --from main --to HEAD --verbose

  install-prettier:
    runs-on: ubuntu-latest
    steps:
      - *checkout-code

      - &cache-prettier
        name: Cache Prettier
        id: cache-prettier
        uses: actions/cache@v5
        with:
          path: node_modules
          key: v1-prettier-${{ env.PRETTIER_VERSION }}

      - name: Install Prettier
        if: steps.cache-prettier.outputs.cache-hit != 'true'
        run: npm i -D prettier@${{ env.PRETTIER_VERSION }}

  run-lint:
    runs-on: ubuntu-latest
    needs: install-prettier
    steps:
      - *checkout-code
      - *cache-prettier

      - name: Run Prettier check
        run: ./node_modules/.bin/prettier --check .

  install-golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - &cache-golangci
        name: Cache Golangci Lint
        id: cache-golangci
        uses: actions/cache@v5
        with:
          path: ~/go/bin/golangci-lint
          key: v3-golangci-lint-${{ env.GOLANGCI_LINT_VERSION }}

      - name: Install Golangci Lint
        if: steps.cache-golangci.outputs.cache-hit != 'true'
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b ~/go/bin v${{ env.GOLANGCI_LINT_VERSION }}

  run-golangci-lint:
    runs-on: ubuntu-latest
    needs: install-golangci-lint
    steps:
      - *checkout-code

      - &setup-go
        name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - *cache-golangci

      - name: Run golangci-lint
        run: ~/go/bin/golangci-lint run -v

  run-test:
    runs-on: ubuntu-latest
    needs: [run-commitlint, run-lint, run-golangci-lint]
    steps:
      - *checkout-code
      - *setup-go

      - name: Run tests
        run: make test | grep -v '"Action":"build' | tee test-results.json

      - name: Test Report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v2
        with:
          name: Unit Tests
          path: test-results.json
          reporter: golang-json

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: cover.out

  run-test-coverage:
    runs-on: ubuntu-latest
    needs: run-test
    steps:
      - *checkout-code
      - *setup-go

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage

      - name: Rename to coverage.out for config compatibility
        run: cp cover.out coverage.out

      - name: Check test coverage
        uses: vladopajic/go-test-coverage@v2
        with:
          config: .testcoverage.yml

      - name: Convert coverage to Cobertura format
        run: |
          go install github.com/boumenot/gocover-cobertura@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          gocover-cobertura -ignore-gen-files < coverage.out > coverage.xml

      - name: Generate coverage report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          hide_branch_rate: true
          hide_complexity: true
          indicators: true
          output: both
          thresholds: "40 60"

      - name: Post coverage summary
        run: |
          echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
