name: Update Golang Dependencies

on:
  workflow_dispatch:

  # Weekly on Mondays at 10 AM UTC
  schedule:
    - cron: "0 10 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Create temporary GitHub App Token
        id: app
        uses: actions/create-github-app-token@v3
        with:
          owner: ${{ github.repository_owner }}
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Update Golang Dependencies
        uses: alchemaxinc/update-deps/golang@v1
        with:
          token: ${{ steps.app.outputs.token }}
          app-slug: ${{ vars.BOT_APP_SLUG }}
          base-branch: "main"
          commit-message: "chore: updating golang dependencies"
          auto-merge: "true"
          strategy: "everything"
